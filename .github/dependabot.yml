version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "02:30"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
    labels:
      - dependencies
